services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akd_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - APP_NAME=${APP_NAME:-DPR Monitoring Agent}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KNOWLEDGE_DIR=/knowledge
    volumes:
      - ../knowledge:/knowledge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: akd_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  watcher:
    build:
      context: ./backend
    container_name: akd_watcher
    command: python -m scripts.watcher
    environment:
      - API_URL=http://backend:8000
      - PDF_DIR=/app/data/pdfs
      - OUTPUT_DIR=/app/output
    volumes:
      - ./data/pdfs:/app/data/pdfs
      - ./output:/app/output
    depends_on:
      - backend
    restart: unless-stopped
